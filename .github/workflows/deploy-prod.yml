name: Deploy (prod)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  ENV_NAME: prod
  LOCATION: westus2

jobs:
  infra:
    name: Deploy infra
    runs-on: ubuntu-latest
    environment: prod   # add a required-reviewer protection on this environment
    outputs:
      apiName: ${{ steps.outputs.outputs.apiName }}
      swaToken: ${{ steps.swaToken.outputs.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ env.LOCATION }}
          template: infra/main.bicep
          parameters: >-
            infra/main.parameters.prod.json
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OID }}
            sqlEntraAdminLogin=${{ secrets.SQL_ENTRA_ADMIN_UPN }}
            deployerPrincipalId=${{ secrets.DEPLOYER_PRINCIPAL_ID }}
          deploymentName: mtgartranker-prod-${{ github.run_number }}

      - id: outputs
        run: echo "apiName=$(echo '${{ steps.deploy.outputs.apiHostname }}' | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Get SWA deployment token
        id: swaToken
        run: |
          TOKEN=$(az staticwebapp secrets list --name swa-mtgartrank-prod --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

  api:
    name: Deploy API
    needs: infra
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet publish src/api/MtGArtRanker.Api.csproj -c Release -o publish

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.infra.outputs.apiName }}
          package: publish

  web:
    name: Deploy Web
    needs: infra
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.infra.outputs.swaToken }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/web
          output_location: dist
          skip_app_build: false