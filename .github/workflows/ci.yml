name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore src/api/MtGArtRanker.Api.csproj
      - run: dotnet build src/api/MtGArtRanker.Api.csproj -c Release --no-restore
      - run: dotnet test src/api/MtGArtRanker.Api.csproj -c Release --no-build --verbosity normal
        continue-on-error: true # no tests yet

  web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - run: npm ci
      - run: npm run build

  bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-bicep@v2
      - run: bicep build infra/main.bicep